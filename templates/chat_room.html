{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-3">
    <div class="col-lg-6 col-md-8">
        <div class="card border-0 rounded-4 shadow-sm" style="height: 75vh; display: flex; flex-direction: column;">
            
            <div class="card-header bg-white border-bottom p-3 d-flex align-items-center">
                <a href="{{ url_for('product.product_detail', product_id=room.product_id) }}" class="text-dark me-3"><i class="bi bi-arrow-left fs-4"></i></a>
                <div>
                    <h5 class="mb-0 fw-bold">{{ other_user.username }}</h5>
                    <small class="text-muted">{{ room.product.title }}</small>
                </div>
            </div>
            
            <div class="card-body" style="overflow-y: auto; background-color: #f1f3f5; display: flex; flex-direction: column;">
                {% for msg in messages %}
                    {% if msg.sender_id == current_user.id %}
                    <!-- 내 메시지 (오른쪽) -->
                    <div class="d-flex justify-content-end mb-3">
                        <div class="bg-primary text-white p-3 rounded-4 shadow-sm" style="max-width: 75%; border-bottom-right-radius: 4px;">
                            {{ msg.content }}
                        </div>
                    </div>
                    {% else %}
                    <!-- 상대방 메시지 (왼쪽) -->
                    <div class="d-flex justify-content-start mb-3">
                        <div class="bg-white text-dark p-3 rounded-4 shadow-sm" style="max-width: 75%; border-bottom-left-radius: 4px;">
                            {{ msg.content }}
                        </div>
                    </div>
                    {% endif %}
                {% else %}
                    <div class="text-center text-muted my-auto pb-5">
                        <i class="bi bi-chat-heart fs-1 d-block mb-2"></i>
                        채팅을 보내 대화를 시작해보세요!
                    </div>
                {% endfor %}
            </div>
            
            <div class="card-footer bg-white border-top p-3">
                <form method="POST" class="d-flex gap-2 mb-0">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    <input type="text" name="content" class="form-control rounded-pill px-4 bg-light border-0" placeholder="메시지 입력..." required autocomplete="off">
                    <button type="submit" class="btn btn-primary rounded-circle shadow-sm" style="width: 45px; height: 45px; flex-shrink: 0;"><i class="bi bi-send-fill"></i></button>
                </form>
            </div>
        </div>
    </div>
</div>
<!-- 스크롤 맨 아래로 자동 이동 -->
<script>
    const chatBody = document.querySelector('.card-body');
    chatBody.scrollTop = chatBody.scrollHeight;
</script>
{% endblock %}
