{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-4 mt-3">
            <div class="card-body p-4 p-md-5">
                <h3 class="fw-bold mb-4 text-center">상품 등록</h3>
                <form action="{{ url_for('product.register_product') }}" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium">상품명</label>
                        <input type="text" class="form-control form-control-lg" name="title" placeholder="어떤 물건을 판매하시나요?" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium">가격</label>
                        <div class="input-group input-group-lg">
                            <input type="number" class="form-control" name="price" placeholder="가격을 입력해주세요" required>
                            <span class="input-group-text bg-white">원</span>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium">상품 설명</label>
                        <textarea class="form-control" name="description" rows="5" placeholder="상품에 대한 상세한 설명을 적어주세요." required></textarea>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label fw-medium">상품 사진 <span class="text-muted">(선택)</span></label>
                        <input type="file" class="form-control" name="image" accept="image/png, image/jpeg, image/gif">
                        <div class="form-text mt-2"><i class="bi bi-info-circle me-1"></i>PNG, JPG, GIF 파일만 업로드 가능합니다. (최대 5MB)</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-3">상품 등록하기</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
