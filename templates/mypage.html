{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 rounded-4 mt-4">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-circle display-4 text-primary mb-3"></i>
                    <h3 class="fw-bold m-0">마이페이지</h3>
                </div>
                
                <div class="mb-4">
                    <label class="form-label fw-medium text-muted">계정 아이디</label>
                    <input type="text" class="form-control form-control-lg bg-light" value="{{ current_user.username }}" readonly>
                </div>

                <hr class="my-4">

                <h5 class="fw-bold mb-3">비밀번호 변경</h5>
                <form action="{{ url_for('auth.mypage') }}" method="POST">
                    <!-- CSRF 방어 토큰 -->
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium">현재 비밀번호</label>
                        <input type="password" class="form-control" name="current_password" required placeholder="본인 확인을 위해 입력해주세요">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-medium">새 비밀번호</label>
                        <input type="password" class="form-control" name="new_password" required placeholder="영문, 숫자, 특수문자 포함 8자리 이상" pattern="^(?=.*[A-Za-z])(?=.*\d)(?=.*[@$!%*#?&])[A-Za-z\d@$!%*#?&]{8,}$" title="영문, 숫자, 특수문자를 포함하여 8자리 이상이어야 합니다.">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-3">비밀번호 변경하기</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
