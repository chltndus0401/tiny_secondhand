{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="bg-danger text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3 shadow-sm" style="width: 60px; height: 60px;">
                        <i class="bi bi-exclamation-triangle-fill fs-2"></i>
                    </div>
                    <h3 class="fw-bolder text-dark">상품 신고하기</h3>
                    <p class="text-muted">문제가 있는 상품인가요? 관리자에게 알려주세요.</p>
                </div>

                <div class="p-3 bg-light rounded-3 mb-4 text-center fw-bold">
                    신고 대상: <span class="text-primary">{{ product.title }}</span>
                </div>

                <form action="{{ url_for('admin.report_product', product_id=product.id) }}" method="POST">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-4">
                        <label class="form-label fw-medium">신고 사유</label>
                        <textarea class="form-control" name="reason" rows="4" placeholder="사기 의심, 부적절한 상품, 욕설 등 구체적인 사유를 적어주세요." required></textarea>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('product.product_detail', product_id=product.id) }}" class="btn btn-light btn-lg w-50 fw-bold rounded-pill">취소</a>
                        <button type="submit" class="btn btn-danger btn-lg w-50 fw-bold rounded-pill shadow-sm">신고 제출하기</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
