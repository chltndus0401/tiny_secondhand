{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <div class="card shadow-sm border-0 rounded-4 mt-3">
            <div class="card-body p-4 p-md-5">
                <h3 class="fw-bold mb-4 text-center">상품 수정</h3>
                <form action="{{ url_for('product.edit_product', product_id=product.id) }}" method="POST" enctype="multipart/form-data">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium">상품명</label>
                        <input type="text" class="form-control form-control-lg" name="title" value="{{ product.title }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium">가격</label>
                        <div class="input-group input-group-lg">
                            <input type="number" class="form-control" name="price" value="{{ product.price }}" required>
                            <span class="input-group-text bg-white">원</span>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label fw-medium">상품 설명</label>
                        <textarea class="form-control" name="description" rows="5" required>{{ product.description }}</textarea>
                    </div>
                    
                    <div class="mb-5">
                        <label class="form-label fw-medium">상품 사진 <span class="text-muted">(선택 - 미입력 시 기존 유지)</span></label>
                        <input type="file" class="form-control" name="image" accept="image/png, image/jpeg, image/gif">
                    </div>
                    
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('product.product_detail', product_id=product.id) }}" class="btn btn-light btn-lg w-25 fw-bold rounded-3">취소</a>
                        <button type="submit" class="btn btn-primary btn-lg w-75 fw-bold rounded-3">수정 완료</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
