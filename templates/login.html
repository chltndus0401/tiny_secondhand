{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 70vh;">
    <div style="width: 100%; max-width: 380px;">
        <div class="text-center mb-5">
            <h2 class="fw-bolder text-dark" style="letter-spacing: -1px;">로그인</h2>
            <p class="text-muted">Tiny Shop에 오신 것을 환영해요.</p>
        </div>

        <form action="{{ url_for('auth.login') }}" method="POST">
            <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
            
            <div class="mb-4">
                <input type="text" class="form-control form-control-lg border-0 border-bottom rounded-0 bg-transparent px-1" name="username" placeholder="아이디" required style="box-shadow: none;">
            </div>
            
            <div class="mb-5">
                <input type="password" class="form-control form-control-lg border-0 border-bottom rounded-0 bg-transparent px-1" name="password" placeholder="비밀번호" required style="box-shadow: none;">
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-pill shadow-sm" style="background: linear-gradient(45deg, #0d6efd, #0dcaf0); border: none;">
                로그인 시작하기
            </button>
        </form>
        
        <div class="text-center mt-5">
            <a href="{{ url_for('auth.register') }}" class="text-secondary fw-medium text-decoration-none border-bottom border-secondary pb-1">회원가입하기</a>
        </div>
    </div>
</div>
{% endblock %}
